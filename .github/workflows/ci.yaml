name: CI

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  # renovate: datasource=node-version depName=node
  NODE_VERSION: 24.18.0

jobs:
  discovery:
    name: Discovery
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build matrix from charts/* containing Chart.yaml
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t dirs < <(find charts -mindepth 1 -maxdepth 2 -type f -name Chart.yaml -print0 | xargs -0 -n1 dirname | sort -u)
          json='{"include":['
          first=1
          for d in "${dirs[@]}"; do
            if [[ $first -eq 1 ]]; then first=0; else json+=","; fi
            json+="{\"working-directory\":\"$d\"}"
          done
          json+="]}"
          echo "matrix=$json" >> "$GITHUB_OUTPUT"
          echo "Discovered charts matrix: $json"

  vitest:
    name: Run Vitest
    runs-on: ubuntu-24.04
    needs: discovery
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dev dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm run prettier:check

      - name: Run unit tests (vitest)
        run: pnpm run test

  helm-tests:
    name: Helm Chart Unit Tests
    needs: discovery
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discovery.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.3

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --verify=false

      - name: Run Helm chart unit tests
        working-directory: ${{ matrix.working-directory }}
        run: |
          helm unittest -f "templates/tests/**/*.yaml" .

  gather-results:
    name: Result
    runs-on: ubuntu-latest
    needs:
      - vitest
      - helm-tests
    if: always()
    steps:
      - name: Evaluate job results
        shell: bash
        run: |
          declare -A results
          results[vitest]="${{ needs.vitest.result }}"
          results[helm-tests]="${{ needs.helm-tests.result }}"
          echo "Results: ${results[@]}"
          failed=0
          for k in "${!results[@]}"; do
            v="${results[$k]}"
            echo "$k => $v"
            if [[ "$v" != "success" ]]; then
              failed=1
            fi
          done
          if [[ $failed -ne 0 ]]; then
            echo "One or more jobs failed. Failing gather-results."
            exit 1
          fi
          echo "All jobs succeeded."
